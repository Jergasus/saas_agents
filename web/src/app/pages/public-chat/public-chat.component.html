<div class="h-screen w-screen flex flex-col justify-end items-end p-4 font-sans bg-transparent">
  
  @if (isOpen && agentData) {
    <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl border border-slate-200 overflow-hidden flex flex-col h-[550px] max-h-[80vh] mb-4 animate-fade-in-up">
      
      <!-- Header -->
      <div [style.backgroundColor]="agentData.primaryColor || '#2563EB'" class="p-4 text-white flex flex-col gap-2 transition-colors duration-300 shadow-md z-10">
        <div class="flex justify-between items-center">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center backdrop-blur-sm border border-white/30">
              <span class="text-xl">🤖</span>
            </div>
            <div>
              <h3 class="font-bold text-lg leading-tight">{{ agentData.chatTitle || 'AI Assistant' }}</h3>
              <p class="text-xs text-white/80 flex items-center gap-1">
                <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
                Online
              </p>
            </div>
          </div>
          <div class="flex items-center gap-2">
            <button (click)="resetChat()" class="w-8 h-8 rounded-full hover:bg-white/20 flex items-center justify-center transition-colors" title="Reset chat">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
              </svg>
            </button>
            <button (click)="toggleChat()" class="w-8 h-8 rounded-full hover:bg-white/20 flex items-center justify-center transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
              </svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Messages Area -->
      <div #scrollContainer class="flex-1 p-4 overflow-y-auto bg-slate-50 flex flex-col gap-4 custom-scrollbar">
        @for (msg of messages; track $index) {
          <div class="flex w-full" [ngClass]="msg.isUser ? 'justify-end' : 'justify-start'">
            @if (!msg.isUser) {
              <div class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center mr-2 shrink-0 text-sm border border-slate-300">
                🤖
              </div>
            }
            <div [ngClass]="msg.isUser ? 'rounded-tl-2xl rounded-tr-2xl rounded-bl-2xl text-white shadow-md' : 'rounded-tl-2xl rounded-tr-2xl rounded-br-2xl bg-white border border-slate-200 text-slate-800 shadow-sm'" 
                 class="max-w-[75%] p-3.5 text-sm leading-relaxed"
                 [style.backgroundColor]="msg.isUser ? (agentData.primaryColor || '#2563EB') : '#ffffff'">
              {{ msg.text }}
            </div>
          </div>
        }
        @if (isLoading) {
          <div class="flex w-full justify-start">
            <div class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center mr-2 shrink-0 text-sm border border-slate-300">
              🤖
            </div>
            <div class="rounded-tl-2xl rounded-tr-2xl rounded-br-2xl bg-white border border-slate-200 text-slate-500 max-w-[75%] p-4 shadow-sm flex items-center gap-1.5">
              <span class="w-2 h-2 bg-slate-400 rounded-full animate-bounce"></span>
              <span class="w-2 h-2 bg-slate-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></span>
              <span class="w-2 h-2 bg-slate-400 rounded-full animate-bounce" style="animation-delay: 0.4s"></span>
            </div>
          </div>
        }
      </div>

      <!-- Input Area -->
      <div class="p-4 bg-white border-t border-slate-100">
        <div class="flex gap-2 items-center bg-slate-50 p-1.5 rounded-full border border-slate-200 focus-within:border-blue-400 focus-within:ring-2 focus-within:ring-blue-100 transition-all"
             [style.borderColor]="agentData.primaryColor ? agentData.primaryColor + '40' : ''">
          <input [(ngModel)]="newMessage" (keyup.enter)="sendMessage()" type="text" placeholder="Type your message..." 
            class="flex-1 bg-transparent px-4 py-2 text-sm outline-none text-slate-700 placeholder-slate-400">
          <button (click)="sendMessage()" [disabled]="isLoading || !newMessage" 
            class="text-white p-2 rounded-full w-10 h-10 flex items-center justify-center disabled:opacity-50 disabled:cursor-not-allowed transition-all duration-300 hover:scale-105 shadow-sm"
            [style.backgroundColor]="agentData.primaryColor || '#2563EB'">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transform rotate-90" viewBox="0 0 20 20" fill="currentColor">
              <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
            </svg>
          </button>
        </div>
        <div class="text-center mt-2">
          <span class="text-[10px] text-slate-400 font-medium">Powered by AI Agents</span>
        </div>
      </div>
    </div>
  }

  <!-- Floating Button -->
  @if (agentData && !isOpen) {
    <button (click)="toggleChat()" 
      class="w-16 h-16 text-white rounded-full shadow-2xl flex items-center justify-center hover:scale-110 transition-all duration-300 relative group"
      [style.backgroundColor]="agentData.primaryColor || '#2563EB'">
      @if (unreadCount > 0) {
        <span class="absolute -top-2 -right-2 bg-red-500 text-white text-xs font-bold w-6 h-6 rounded-full flex items-center justify-center border-2 border-white animate-bounce">{{ unreadCount }}</span>
      }
      <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
      </svg>
    </button>
  }
</div>
