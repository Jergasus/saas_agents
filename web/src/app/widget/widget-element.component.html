<div class="widget-root">
  @if (isOpen && agentData) {
    <div class="chat-panel">
      <!-- Header -->
      <div class="chat-header" [style.backgroundColor]="agentData.primaryColor || '#2563EB'">
        <div class="header-left">
          <div class="avatar">
            <span>🌸</span>
          </div>
          <div>
            <h3 class="header-title">{{ agentData.chatTitle || 'AI Assistant' }}</h3>
            <p class="header-status">
              <span class="status-dot"></span>
              Online
            </p>
          </div>
        </div>
        <div class="header-actions">
          <button (click)="resetChat()" class="header-btn" title="Reset chat">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
          </button>
          <button (click)="toggleChat()" class="header-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Messages -->
      <div #scrollContainer class="messages-area">
        @for (msg of messages; track $index) {
          <div class="message-row" [class.user]="msg.isUser">
            @if (!msg.isUser) {
              <div class="bot-avatar">🌸</div>
            }
            <div class="message-bubble" [class.user-bubble]="msg.isUser" [class.bot-bubble]="!msg.isUser"
                 [style.backgroundColor]="msg.isUser ? (agentData.primaryColor || '#2563EB') : '#ffffff'">
              @if (msg.isUser) {
                {{ msg.text }}
              } @else {
                <div class="markdown-body" [innerHTML]="msg.html"></div>
              }
            </div>
          </div>
        }
        @if (isLoading) {
          <div class="message-row">
            <div class="bot-avatar">🌸</div>
            <div class="message-bubble bot-bubble typing">
              <span class="dot"></span>
              <span class="dot" style="animation-delay: 0.2s"></span>
              <span class="dot" style="animation-delay: 0.4s"></span>
            </div>
          </div>
        }
      </div>

      <!-- Input -->
      <div class="input-area">
        <div class="input-wrapper">
          <input [(ngModel)]="newMessage" (keyup.enter)="sendMessage()" type="text" placeholder="Type your message..."
            class="chat-input">
          <button (click)="sendMessage()" [disabled]="isLoading || !newMessage" class="send-btn"
                  [style.backgroundColor]="agentData.primaryColor || '#2563EB'">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 20 20" fill="currentColor" style="transform: rotate(90deg)">
              <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
            </svg>
          </button>
        </div>
        <div class="powered-by">Powered by AI Agents</div>
      </div>
    </div>
  }

  <!-- Floating Button -->
  @if (agentData && !isOpen) {
    <button (click)="toggleChat()" class="fab" [style.backgroundColor]="agentData.primaryColor || '#2563EB'">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
      </svg>
    </button>
  }
</div>
